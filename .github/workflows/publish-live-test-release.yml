name: Publish ImperiumOfMan Live Test Release
run-name: Publish live-test release from ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package/ImperiumOfMan/**"
      - ".github/workflows/publish-live-test-release.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Assemble complete Workshop staging package
        shell: bash
        run: |
          set -euo pipefail

          test -f package/ImperiumOfMan/modmanifest.json
          test -f package/ImperiumOfMan/ImperiumOfMan.dll
          test -f package/ImperiumOfMan/imperiumofman.bundle
          test -f package/ImperiumOfMan/thumbnail.png

          rm -rf release-dist /tmp/lib-harmony
          mkdir -p release-dist/package /tmp/lib-harmony
          cp -a package/ImperiumOfMan/. release-dist/package/

          echo "Downloading the Harmony runtime dependency used by this project."
          curl --fail --location --retry 3 \
            "https://www.nuget.org/api/v2/package/Lib.Harmony/2.3.3" \
            --output /tmp/lib-harmony.nupkg
          unzip -q /tmp/lib-harmony.nupkg -d /tmp/lib-harmony

          HARMONY_DLL=""
          for candidate in \
            /tmp/lib-harmony/lib/net472/0Harmony.dll \
            /tmp/lib-harmony/lib/net48/0Harmony.dll \
            /tmp/lib-harmony/lib/netstandard2.0/0Harmony.dll; do
            if [ -f "$candidate" ]; then
              HARMONY_DLL="$candidate"
              break
            fi
          done

          if [ -z "$HARMONY_DLL" ]; then
            HARMONY_DLL="$(find /tmp/lib-harmony -type f -name 0Harmony.dll | head -n 1)"
          fi

          test -n "$HARMONY_DLL"
          test -f "$HARMONY_DLL"
          cp "$HARMONY_DLL" release-dist/package/0Harmony.dll

          echo "Converting the mislabeled thumbnail into genuine PNG data."
          python3 -m pip install --disable-pip-version-check --quiet Pillow
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image

          source = Path("release-dist/package/thumbnail.png")
          temporary = source.with_suffix(".converted.png")

          with Image.open(source) as image:
              image.convert("RGBA").save(temporary, format="PNG")

          temporary.replace(source)

          with Image.open(source) as image:
              if image.format != "PNG":
                  raise RuntimeError(f"thumbnail conversion failed: detected {image.format}")
          PY

          cat > release-dist/package/STEAM_TESTING.txt <<'EOF'
          ImperiumOfMan private Steam Workshop testing

          IMPORTANT:
          Quasimorph code mods are registered through Steam Workshop. Copying this folder into
          C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods does not register this DLL mod.

          FIRST TEST ITEM

          1. Close Quasimorph and remove previous loose ImperiumOfMan test folders from the game Mods directory.
          2. Extract this package to a simple staging path with no spaces, for example:
             C:\QuasimorphModTest\ImperiumOfMan
          3. Confirm the staging folder directly contains:
             modmanifest.json
             ImperiumOfMan.dll
             0Harmony.dll
             imperiumofman.bundle
             thumbnail.png
          4. Start Quasimorph with the Official Developer Console Mod enabled.
          5. Open the developer console and run:
             mod_createworkshopitem C:\QuasimorphModTest\ImperiumOfMan
          6. Record the Workshop item ID printed by the game.
          7. Open that new Workshop item in Steam and subscribe to it.
          8. Restart Steam and Quasimorph.
          9. Run listmod in the developer console and confirm Cvar_ImperiumOfMan appears.

          LATER UPDATES

          Replace <ITEM_ID> with the ID created above, then run:
             mod_updateworkshopitem <ITEM_ID> C:\QuasimorphModTest\ImperiumOfMan TRUE

          Restart Steam and Quasimorph after each update. Keep the item non-public while it is under live testing.
          Disable or unsubscribe from the discontinued andre_ImperiumOfMan item during ordinary tests.
          EOF

          (
            cd release-dist/package
            sha256sum \
              modmanifest.json \
              ImperiumOfMan.dll \
              0Harmony.dll \
              imperiumofman.bundle \
              thumbnail.png \
              > PACKAGE_CONTENTS_SHA256.txt

            zip -r -9 ../ImperiumOfMan-Workshop-Staging.zip .
          )

          (
            cd release-dist
            sha256sum ImperiumOfMan-Workshop-Staging.zip > SHA256SUMS.txt
          )

      - name: Create or update GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          NOTES=$(cat <<EOF
          Development package for private Steam Workshop testing.

          Quasimorph did not discover the DLL mod from the local game Mods folder. Extract ImperiumOfMan-Workshop-Staging.zip to a separate staging directory such as:

          C:\QuasimorphModTest\ImperiumOfMan

          Then use the Official Developer Console Mod command:

          mod_createworkshopitem C:\QuasimorphModTest\ImperiumOfMan

          Subscribe to the newly created Workshop item and restart Steam and Quasimorph. Read STEAM_TESTING.txt inside the archive before proceeding.

          Source commit: $GITHUB_SHA
          EOF
          )

          if gh release view live-test-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete-asset live-test-latest ImperiumOfMan-live-test.zip --repo "$GITHUB_REPOSITORY" --yes >/dev/null 2>&1 || true
            gh release delete-asset live-test-latest ImperiumOfMan.zip --repo "$GITHUB_REPOSITORY" --yes >/dev/null 2>&1 || true
            gh release delete-asset live-test-latest ImperiumOfMan-Workshop-Staging.zip --repo "$GITHUB_REPOSITORY" --yes >/dev/null 2>&1 || true
            gh release delete-asset live-test-latest SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --yes >/dev/null 2>&1 || true

            gh release upload live-test-latest \
              release-dist/ImperiumOfMan-Workshop-Staging.zip \
              release-dist/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY"

            gh release edit live-test-latest \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ImperiumOfMan Workshop Test Package" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create live-test-latest \
              release-dist/ImperiumOfMan-Workshop-Staging.zip \
              release-dist/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ImperiumOfMan Workshop Test Package" \
              --notes "$NOTES" \
              --prerelease
          fi
