name: Publish ImperiumOfMan Live Test Release
run-name: Publish live-test release from ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package/ImperiumOfMan/**"
      - ".github/workflows/publish-live-test-release.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Assemble Windows-friendly release archive
        shell: bash
        run: |
          set -euo pipefail

          test -f package/ImperiumOfMan/modmanifest.json
          test -f package/ImperiumOfMan/ImperiumOfMan.dll
          test -f package/ImperiumOfMan/imperiumofman.bundle
          test -f package/ImperiumOfMan/thumbnail.png

          rm -rf release-dist
          mkdir -p release-dist/package
          cp -a package/ImperiumOfMan/. release-dist/package/

          cat > release-dist/package/INSTALL_LOCAL.txt <<'EOF'
          ImperiumOfMan local live-test installation

          1. Close Quasimorph completely.
          2. Disable or unsubscribe from the discontinued andre_ImperiumOfMan package.
          3. Delete or move any incorrectly extracted folder named ImperiumOfMan-live-test from the Quasimorph Mods directory.
          4. Back up any existing folder at:
             C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods\ImperiumOfMan
          5. Put ImperiumOfMan.zip inside:
             C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods
          6. Use Windows Extract All on ImperiumOfMan.zip.
          7. Confirm this file exists directly at:
             C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods\ImperiumOfMan\modmanifest.json
          8. Start Quasimorph with a backed-up or disposable save and review the log.
          EOF

          cd release-dist/package
          zip -r -9 ../ImperiumOfMan.zip .
          cd ..
          sha256sum ImperiumOfMan.zip > SHA256SUMS.txt

      - name: Create or update GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          NOTES=$(cat <<EOF
          Development prerelease for direct local Quasimorph testing.

          Download ImperiumOfMan.zip, place it inside the Quasimorph Mods directory, and use Windows Extract All. Its root-level layout is designed to produce:

          C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods\ImperiumOfMan\modmanifest.json

          Remove any incorrectly extracted ImperiumOfMan-live-test folder, disable the discontinued andre_ImperiumOfMan package, and back up valuable saves before testing.

          Source commit: $GITHUB_SHA
          EOF
          )

          if gh release view live-test-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete-asset live-test-latest ImperiumOfMan-live-test.zip --repo "$GITHUB_REPOSITORY" --yes >/dev/null 2>&1 || true
            gh release delete-asset live-test-latest ImperiumOfMan.zip --repo "$GITHUB_REPOSITORY" --yes >/dev/null 2>&1 || true
            gh release delete-asset live-test-latest SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --yes >/dev/null 2>&1 || true

            gh release upload live-test-latest \
              release-dist/ImperiumOfMan.zip \
              release-dist/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY"

            gh release edit live-test-latest \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ImperiumOfMan Live Test" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create live-test-latest \
              release-dist/ImperiumOfMan.zip \
              release-dist/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ImperiumOfMan Live Test" \
              --notes "$NOTES" \
              --prerelease
          fi
