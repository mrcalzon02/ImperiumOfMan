name: Publish ImperiumOfMan Live Test Release
run-name: Publish live-test release from ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package/ImperiumOfMan/**"
      - ".github/workflows/publish-live-test-release.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Assemble release archive
        shell: bash
        run: |
          set -euo pipefail

          test -f package/ImperiumOfMan/modmanifest.json
          test -f package/ImperiumOfMan/ImperiumOfMan.dll
          test -f package/ImperiumOfMan/imperiumofman.bundle
          test -f package/ImperiumOfMan/thumbnail.png

          rm -rf release-dist
          mkdir -p release-dist/ImperiumOfMan
          cp -a package/ImperiumOfMan/. release-dist/ImperiumOfMan/

          cat > release-dist/ImperiumOfMan/INSTALL_LOCAL.txt <<'EOF'
          ImperiumOfMan local live-test installation

          1. Close Quasimorph completely.
          2. Disable or unsubscribe from the discontinued andre_ImperiumOfMan package.
          3. Back up any existing folder at:
             C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods\ImperiumOfMan
          4. Extract the ImperiumOfMan folder from this ZIP into:
             C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods
          5. Confirm this file exists directly at:
             C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods\ImperiumOfMan\modmanifest.json
          6. Start Quasimorph with a backed-up or disposable save and review the log.
          EOF

          cd release-dist
          zip -r -9 ImperiumOfMan-live-test.zip ImperiumOfMan
          sha256sum ImperiumOfMan-live-test.zip > SHA256SUMS.txt

      - name: Create or update GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          NOTES=$(cat <<EOF
          Development prerelease for direct local Quasimorph testing.

          Download ImperiumOfMan-live-test.zip and extract the included ImperiumOfMan folder into:

          C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods

          Disable the discontinued andre_ImperiumOfMan package before testing and back up valuable saves.

          Source commit: $GITHUB_SHA
          EOF
          )

          if gh release view live-test-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload live-test-latest \
              release-dist/ImperiumOfMan-live-test.zip \
              release-dist/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY" \
              --clobber

            gh release edit live-test-latest \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ImperiumOfMan Live Test" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create live-test-latest \
              release-dist/ImperiumOfMan-live-test.zip \
              release-dist/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ImperiumOfMan Live Test" \
              --notes "$NOTES" \
              --prerelease
          fi
