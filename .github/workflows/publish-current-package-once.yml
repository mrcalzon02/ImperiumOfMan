name: Publish Current Imperium Reforged Package Once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-current-package-once.yml"

permissions:
  contents: write

jobs:
  publish-current-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Archive committed package exactly
        shell: bash
        run: |
          set -euo pipefail
          test -d package/ImperiumOfMan
          cd package
          zip -r -9 ../ImperiumReforged-current-package.zip ImperiumOfMan

      - name: Create or update prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          NOTES=$(cat <<EOF
          Current committed runtime package from package/ImperiumOfMan.

          This archive was published exactly from the committed package directory. The new station diagnostics source exists on main but is not present in the packaged DLL until the project is rebuilt against a local Quasimorph installation.

          Source commit: $GITHUB_SHA
          EOF
          )

          if gh release view live-test-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload live-test-latest \
              ImperiumReforged-current-package.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber

            gh release edit live-test-latest \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Imperium Reforged Current Test Package" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create live-test-latest \
              ImperiumReforged-current-package.zip \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Imperium Reforged Current Test Package" \
              --notes "$NOTES" \
              --prerelease
          fi
