name: Quasimorph Local Test Package
run-name: Live-test package • ${{ github.ref_name }} • ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "modmanifest.json"
      - "src/**"
      - "package/ImperiumOfMan/**"
      - "tools/Validate-Package.ps1"
      - ".github/workflows/package-local-test.yml"

permissions:
  contents: read

jobs:
  validate-and-package:
    name: Validate and package ImperiumOfMan
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Validate runtime package
        shell: pwsh
        run: ./tools/Validate-Package.ps1

      - name: Add local installation instructions
        shell: pwsh
        run: |
          @'
          # ImperiumOfMan local-test installation

          1. Close Quasimorph completely.
          2. Disable or unsubscribe from the discontinued `andre_ImperiumOfMan` Workshop package.
          3. Back up any existing local folder at:

             `C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods\ImperiumOfMan`

          4. Extract the contents of this artifact so the runtime files are directly inside:

             `C:\Program Files (x86)\Steam\steamapps\common\Quasimorph\Mods\ImperiumOfMan`

          5. Confirm that the destination directly contains:

             - `modmanifest.json`
             - `ImperiumOfMan.dll`
             - `imperiumofman.bundle`
             - `thumbnail.png`

          6. Start Quasimorph and review the game or Unity log before loading an important campaign.

          Do not create an extra nested folder such as:

          `Mods\ImperiumOfMan\ImperiumOfMan\modmanifest.json`

          The GitHub-hosted runner creates this artifact, but it cannot copy files directly onto your personal computer. Extraction into the local Quasimorph directory must be performed on that computer.
          '@ | Set-Content -LiteralPath ./artifacts/ImperiumOfMan/INSTALL_LOCAL.md -Encoding UTF8

      - name: Publish package report to run summary
        shell: pwsh
        run: Get-Content ./artifacts/ImperiumOfMan/PACKAGE_REPORT.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload local-test package
        uses: actions/upload-artifact@v4
        with:
          name: ImperiumOfMan-local-test-${{ github.run_number }}
          path: artifacts/ImperiumOfMan
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
